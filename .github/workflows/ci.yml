name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Smoke-test the built CLI through a symlink (mimics global install)
        run: |
          ln -sf "$PWD/dist/bin.js" "$RUNNER_TEMP/ecsh"
          out="$(node "$RUNNER_TEMP/ecsh" --version)"
          echo "ecsh --version -> $out"
          test "$out" = "$(node -p "require('./package.json').version")"
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      # OIDC trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # Auth via GitHub OIDC trusted publishing (id-token: write) — no NPM_TOKEN needed
      - run: npm publish --provenance --access public
